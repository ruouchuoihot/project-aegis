<svg width="1300" height="760" viewBox="0 0 1300 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Project Aegis Infrastructure</title>
  <desc id="desc">Docker-first SOC lab architecture with Elastic Agent, Fleet Server, Elasticsearch, Kibana, native Security alerts, Stack Monitoring, AI Gateway, and optional analytics.</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#1f2937" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L11,4 L0,8 Z" fill="#53606f"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #10212b; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #52616b; }
      .group-title { font: 700 16px Arial, sans-serif; fill: #26343d; letter-spacing: 1px; }
      .box-title { font: 700 15px Arial, sans-serif; fill: #ffffff; }
      .box-sub { font: 400 11px Arial, sans-serif; fill: #eef6fb; }
      .note { font: 400 12px Arial, sans-serif; fill: #5b6770; }
      .panel { fill: #f7f9fb; stroke: #d9e0e6; stroke-width: 2; rx: 12; }
      .line { stroke: #53606f; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #697783; stroke-width: 2.2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1300" height="760" fill="#ffffff"/>

  <text x="650" y="48" text-anchor="middle" class="title">Project Aegis</text>
  <text x="650" y="74" text-anchor="middle" class="subtitle">Elastic 8.x SOC and Threat Hunting Lab Inspired by HELK</text>

  <rect x="40" y="120" width="260" height="500" class="panel"/>
  <text x="170" y="154" text-anchor="middle" class="group-title">TELEMETRY SOURCES</text>

  <g filter="url(#shadow)">
    <rect x="72" y="190" width="196" height="78" rx="8" fill="#005571"/>
    <text x="170" y="224" text-anchor="middle" class="box-title">Elastic Agent</text>
    <text x="170" y="246" text-anchor="middle" class="box-sub">logs, metrics, endpoint data</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="316" width="196" height="78" rx="8" fill="#b22222"/>
    <text x="170" y="350" text-anchor="middle" class="box-title">Aegis Simulator</text>
    <text x="170" y="372" text-anchor="middle" class="box-sub">MITRE ATT&amp;CK scenarios</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="442" width="196" height="78" rx="8" fill="#46515c"/>
    <text x="170" y="476" text-anchor="middle" class="box-title">Future Endpoints</text>
    <text x="170" y="498" text-anchor="middle" class="box-sub">Windows, Linux, Atomic tests</text>
  </g>

  <rect x="380" y="115" width="540" height="510" class="panel"/>
  <text x="650" y="149" text-anchor="middle" class="group-title">AEGIS CORE - ELASTIC 8.x</text>

  <g filter="url(#shadow)">
    <rect x="425" y="188" width="190" height="86" rx="8" fill="#111827"/>
    <text x="520" y="225" text-anchor="middle" class="box-title">Fleet Server</text>
    <text x="520" y="248" text-anchor="middle" class="box-sub">agent enrollment and policy</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="685" y="188" width="190" height="86" rx="8" fill="#feb019"/>
    <text x="780" y="225" text-anchor="middle" class="box-title">Elasticsearch</text>
    <text x="780" y="248" text-anchor="middle" class="box-sub">logs, alerts, monitoring</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="425" y="330" width="190" height="86" rx="8" fill="#00bfb3"/>
    <text x="520" y="367" text-anchor="middle" class="box-title">Kibana</text>
    <text x="520" y="390" text-anchor="middle" class="box-sub">Security, Discover, Monitoring</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="685" y="330" width="190" height="86" rx="8" fill="#4b6cb7"/>
    <text x="780" y="367" text-anchor="middle" class="box-title">Detection Engine</text>
    <text x="780" y="390" text-anchor="middle" class="box-sub">native rules and alerts</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="425" y="474" width="190" height="86" rx="8" fill="#7c3aed"/>
    <text x="520" y="511" text-anchor="middle" class="box-title">Security Alerts</text>
    <text x="520" y="534" text-anchor="middle" class="box-sub">.internal.alerts-security</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="685" y="474" width="190" height="86" rx="8" fill="#0f766e"/>
    <text x="780" y="511" text-anchor="middle" class="box-title">Stack Monitoring</text>
    <text x="780" y="534" text-anchor="middle" class="box-sub">.monitoring-* indices</text>
  </g>

  <rect x="1000" y="120" width="260" height="500" class="panel"/>
  <text x="1130" y="154" text-anchor="middle" class="group-title">AI AND ANALYTICS</text>

  <g filter="url(#shadow)">
    <rect x="1032" y="190" width="196" height="78" rx="8" fill="#6a0dad"/>
    <text x="1130" y="224" text-anchor="middle" class="box-title">AI Gateway</text>
    <text x="1130" y="246" text-anchor="middle" class="box-sub">FastAPI and MCP tools</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1032" y="316" width="196" height="78" rx="8" fill="#2563eb"/>
    <text x="1130" y="350" text-anchor="middle" class="box-title">Aegis Alerts</text>
    <text x="1130" y="372" text-anchor="middle" class="box-sub">aegis-alerts-default</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1032" y="442" width="196" height="78" rx="8" fill="#475569"/>
    <text x="1130" y="476" text-anchor="middle" class="box-title">Qdrant / Spark</text>
    <text x="1130" y="498" text-anchor="middle" class="box-sub">optional advanced layer</text>
  </g>

  <path class="line" d="M268 229 C320 229 350 229 425 229"/>
  <path class="line" d="M268 355 C340 355 600 355 685 373"/>
  <path class="dash" d="M268 481 C340 481 360 270 425 238"/>

  <path class="line" d="M615 231 H685"/>
  <path class="line" d="M780 274 V330"/>
  <path class="line" d="M615 373 H685"/>
  <path class="line" d="M780 416 C780 440 650 455 520 474"/>
  <path class="line" d="M780 416 V474"/>
  <path class="line" d="M685 516 H615"/>

  <path class="line" d="M875 231 C940 231 965 229 1032 229"/>
  <path class="line" d="M875 373 C940 373 965 355 1032 355"/>
  <path class="dash" d="M875 517 C958 517 982 482 1032 482"/>

  <text x="650" y="672" text-anchor="middle" class="note">Core runtime: Docker Compose, Elastic 8.12, Fleet, Kibana Security, Stack Monitoring, Aegis Simulator, AI Gateway</text>
  <text x="650" y="698" text-anchor="middle" class="note">Reference model: HELK's open hunting platform, modernized for native Elastic Security and AI-assisted workflows</text>
</svg>
